<!DOCTYPE html>
<html lang="he" dir="rtl">

  <title>CampaignAI — ניתוח קמפיינים חכם</title>
  <!-- preconnect: open TCP early to fast CDNs -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://js.stripe.com" />
  <link rel="dns-prefetch" href="https://saqvsbiehmxlmpsvguis.supabase.co" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

</head>
<body>

    window.__SUPABASE_URL__          = "%%SUPABASE_URL%%";

  </script>
  <script src="/assets/app.js?v=%%BUILD_HASH%%" defer></script>
</body>
</html>
