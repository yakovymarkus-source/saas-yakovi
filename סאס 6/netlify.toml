[build]
  command = "node scripts/inject-env.js"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# Orchestration background function (15 min limit, returns 202 immediately)
[functions."analyze-campaign-background"]
  timeout = 900

[functions."orchestrate-start"]
  timeout = 10

[functions."orchestrate-status"]
  timeout = 10

# Function timeouts
[functions."campaigner-chat"]
  timeout = 26

[functions."process-research-job"]
  timeout = 26

[functions."research-start"]
  timeout = 10

[functions."research-status"]
  timeout = 10

[functions."research-report"]
  timeout = 10

[functions."research-providers"]
  timeout = 10

[functions."strategy-start"]
  timeout = 10

[functions."strategy-status"]
  timeout = 10

[functions."strategy-report"]
  timeout = 10

[functions."process-strategy-job"]
  timeout = 26

[functions."execution-start"]
  timeout = 10

[functions."execution-status"]
  timeout = 10

[functions."execution-report"]
  timeout = 10

[functions."process-execution-job"]
  timeout = 26

[functions."qa-start"]
  timeout = 10

[functions."qa-status"]
  timeout = 10

[functions."qa-report"]
  timeout = 10

[functions."process-qa-job"]
  timeout = 26

[functions."analysis-start"]
  timeout = 10

[functions."analysis-status"]
  timeout = 10

[functions."analysis-report"]
  timeout = 10

[functions."process-analysis-job"]
  timeout = 26

# Scheduled functions
[functions."trigger-pending-jobs"]
  schedule = "*/5 * * * *"

[functions."scheduled-human-agent"]
  schedule = "0 * * * *"

[functions."human-agent-whatsapp-webhook"]
  timeout = 26

# Raw body for Stripe webhook
[functions."billing-webhook"]
  included_files = []

# SPA fallback routing
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/admin/*"
  to     = "/admin/index.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# CORS headers for Netlify Functions
# billing-webhook is excluded - it must accept Stripe servers
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Request-ID"
    Access-Control-Max-Age       = "86400"

# Security headers
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co https://api.stripe.com https://graph.facebook.com https://analyticsdata.googleapis.com https://googleads.googleapis.com; frame-src https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html must never be cached
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
