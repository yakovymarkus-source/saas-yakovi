[build]
  command = "node scripts/inject-env.js"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# ── Function timeouts ─────────────────────────────────────────────────────────
[functions."campaigner-chat"]
  timeout = 26

# ── Scheduled functions ────────────────────────────────────────────────────────
[functions."trigger-pending-jobs"]
  schedule = "*/5 * * * *"

# ── Raw body for Stripe webhook ───────────────────────────────────────────────
[functions."billing-webhook"]
  included_files = []

# ── SPA fallback routing ───────────────────────────────────────────────────────
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/admin/*"
  to     = "/admin/index.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── CORS for Netlify Functions ────────────────────────────────────────────────
# Belt-and-suspenders: http.js already sets these headers in every response.
# This ensures they appear even if a function crashes before returning.
# billing-webhook is intentionally excluded — it must accept Stripe's servers.
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "https://campaignbrain.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Request-ID"
    Access-Control-Max-Age       = "86400"

# ── Security headers ───────────────────────────────────────────────────────────
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co https://api.stripe.com https://graph.facebook.com https://analyticsdata.googleapis.com https://googleads.googleapis.com; frame-src https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html must never be cached — always fresh so new ?v=HASH query strings reach the browser
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
